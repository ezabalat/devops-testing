name: Simulated 5-Step Pipeline (Fail on Phase 3)

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:


jobs:
  simulated:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Phase 1 (simulated)
        shell: bash
        run: |
          S=$(( (RANDOM % 10) + 1 ))
          sleep "$S"
          echo "✅ Phase 1 finished (slept ${S}s)"

      - name: Step 2 - Phase 2 (simulated)
        shell: bash
        run: |
          S=$(( (RANDOM % 10) + 1 ))
          sleep "$S"
          echo "✅ Phase 2 finished (slept ${S}s)"

      # Fase 3: fallo intencional
      - name: Step 3 - Phase 3 (simulated - intentional failure)
        shell: bash
        run: |
          S=$(( (RANDOM % 10) + 1 ))
          sleep "$S"
          echo "❌ Phase 3 failed intentionally after ${S}s"
          exit 1

      - name: Step 4 - Phase 4 (simulated)
        shell: bash
        run: |
          S=$(( (RANDOM % 10) + 1 ))
          sleep "$S"
          echo "✅ Phase 4 finished (slept ${S}s)"

      - name: Step 5 - Phase 5 (simulated)
        shell: bash
        run: |
          S=$(( (RANDOM % 10) + 1 ))
          sleep "$S"
          echo "✅ Phase 5 finished (slept ${S}s)"

      # Notificación final: siempre corre, aunque falle antes
      - name: Final notification (success/failure)
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "🎉 PIPELINE SUCCESS: All phases completed successfully."
          else
            echo "🚨 PIPELINE FAILED: One or more phases failed. Check logs above."
          fi
